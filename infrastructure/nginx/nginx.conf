worker_processes 1;

events {
    worker_connections 1024;
}

http {
    sendfile on;

    # --- 1. BACKEND UPSTREAMS ---
    upstream auth_service {
        server cap-auth-service:3001;
    }

    upstream room_service {
        server cap-room-service:8002;
    }

    upstream reservation_service {
        server cap-reservation-service:3002; 
    }

    # --- 2. FRONTEND UPSTREAM (New) ---
    # Points to the new React container we are going to build
    upstream frontend_app {
        server cap-frontend:80;
    }

    # --- 3. THE MAIN API GATEWAY ---
    server {
        # Listen on the universal web port (80) instead of 8000
        listen 80; 
        
        # Accept traffic from any AWS Public IP or Domain
        server_name _; 

        # ---------------------------------------------------
        # ROUTE A: FRONTEND (React SPA)
        # Any request that does NOT start with /api goes here
        # ---------------------------------------------------
        location / {
            proxy_pass http://frontend_app;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---------------------------------------------------
        # ROUTE B: MICROSERVICES (Backend APIs)
        # ---------------------------------------------------
        location /api/auth {
            proxy_pass http://auth_service;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/rooms {
            proxy_pass http://room_service; 
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/reservations {
            proxy_pass http://reservation_service;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}