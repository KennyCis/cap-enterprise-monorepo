worker_processes 1;

events {
    worker_connections 1024;
}

http {
    sendfile on;

    # Define the Auth Service backend
    upstream auth_service {
      
        server cap-auth-service:3001;
    }

    
    upstream room_service {
    
        server cap-room-service:8002;
    }

    
    upstream reservation_service {
      
        server cap-reservation-service:3002; 
    }

    # API Gateway Server
    server {
        listen 8000;
        server_name localhost;

        # Route for Auth Service
        location /api/auth {
            proxy_pass http://auth_service; #proxy_set_header Host $host;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Route for Room Service
        location /api/rooms {
            proxy_pass http://room_service; 
            proxy_set_header Host $http_host;   #proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Route for Reservation Service
        location /api/reservations {
            proxy_pass http://reservation_service;
            proxy_set_header Host $http_host;           #proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}