worker_processes 1;

events {
    worker_connections 1024;
}

http {
    sendfile on;

    # ── Backend Upstreams ─────────────────────────────────────
    upstream auth_service {
        server cap-auth-service:3001;
    }

    upstream room_service {
        server cap-room-service:8002;
    }

    upstream reservation_service {
        server cap-reservation-service:3002;
    }

    upstream notification_service {
        server cap-notification-service:3003;
    }

    upstream audit_service {
        server cap-audit-service:8080;
    }

    upstream backup_service {
        server cap-backup-service:8081; 
    }

    upstream schedule_service {
        server cap-schedule-service:8083;
    }

    # ── Frontend Upstream ─────────────────────────────────────
    upstream frontend_app {
        server cap-frontend:80;
    }

    # ── Main Server Block ─────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ── WebSocket: Notification Service ───────────────────
        # Must be declared BEFORE the general / location block
        location /ws {
            proxy_pass http://notification_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── Auth Service ───────────────────────────────────────
        location /api/auth {
            proxy_pass http://auth_service;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Room Service ───────────────────────────────────────
        location /api/rooms {
            proxy_pass http://room_service;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Reservation Service ────────────────────────────────
        location /api/reservations {
            proxy_pass http://reservation_service;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Notification Service HTTP ──────────────────────────
        location /api/notifications {
            proxy_pass http://notification_service;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Audit Service (Golang) ─────────────────────────────
        location /api/audit {
            proxy_pass http://audit_service;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Backup Service (Golang) ────────────────────────────
        location /api/backups {
            proxy_pass http://backup_service;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Schedule Service (Java) ────────────────────────────
        location /api/schedules {
            proxy_pass http://schedule_service;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Frontend React SPA ─────────────────────────────────
        # Must be declared LAST — catches everything else
        location / {
            proxy_pass http://frontend_app;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}