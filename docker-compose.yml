services:

  postgres:
    image: postgres:15-alpine
    container_name: cap-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: cap_db
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: cap-redis
    ports:
      - "6379:6379"

  cap-cassandra:
    image: cassandra:latest
    container_name: cap-cassandra
    restart: unless-stopped
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=CAP_Cluster
  
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: cap-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: cap-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  cap-rabbitmq:
    image: rabbitmq:3-management
    container_name: cap-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672" 
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: adminpassword

  cap-mysql:
    image: mysql:8.0
    container_name: cap-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: cap_schedule
      MYSQL_USER: cap_user
      MYSQL_PASSWORD: cap_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_schedule_data:/var/lib/mysql
  
  auth-service:
    build:
      context: ./backend/auth-service
    container_name: cap-auth-service
    environment:
      - PORT=3001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASSWORD=adminpassword
      - DB_NAME=cap_db
      - JWT_SECRET=super_secret_cap_token_2024
    depends_on:
      - postgres

  room-service:
    build:
      context: ./backend/room-service
    container_name: cap-room-service
    ports:  
      - "8002:8002" 
    environment:
      - PORT=8002
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASSWORD=adminpassword
      - DB_NAME=cap_db
    depends_on:
      - postgres

  reservation-service:
    build:
      context: ./backend/reservation-service
    container_name: cap-reservation-service
    environment:
      - PORT=3002
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASSWORD=adminpassword
      - DB_NAME=cap_db
      - KAFKA_BROKER=kafka:29092
    depends_on:
      - postgres
      - kafka

  notification-service:
    build:
      context: ./backend/notification-service
    container_name: cap-notification-service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - KAFKA_BROKER=kafka:29092
    depends_on:
      - kafka

  audit-service:
    build:
      context: ./backend/audit-service
    container_name: cap-audit-service
    ports:
      - "8080:8080" 
    environment:
      - KAFKA_BROKERS=kafka:29092
      - CASSANDRA_HOSTS=cap-cassandra 
    depends_on:
      - kafka
      - cap-cassandra

  backup-service:
    build: 
      context: ./backend/backup-service
      dockerfile: Dockerfile
    container_name: cap-backup-service
    restart: unless-stopped
    environment:
      - RABBITMQ_URL=amqp://admin:adminpassword@cap-rabbitmq:5672/
      - R2_ACCOUNT_ID=local_account_id
    depends_on:
      - cap-rabbitmq

  cap-schedule-service:
    build:
      context: ./backend/schedule-service
      dockerfile: Dockerfile
    container_name: cap-schedule-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://cap-mysql:3306/cap_schedule?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=cap_user
      - SPRING_DATASOURCE_PASSWORD=cap_password
    depends_on:
      - cap-mysql
  
  frontend-app:
    build:
      context: ./frontend/web-app
    container_name: cap-frontend
    restart: always

  nginx-gateway:
    image: nginx:alpine
    container_name: cap-api-gateway
    ports:
      - "80:80" 
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - room-service
      - reservation-service
      - frontend-app

volumes:
  pgdata:
  mysql_schedule_data: