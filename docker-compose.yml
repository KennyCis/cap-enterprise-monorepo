version: '3.8'

services:
  # 1. Base de Datos Relacional Principal
  postgres:
    image: postgres:15-alpine
    container_name: cap-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: cap_db
    volumes:
      - pgdata:/var/lib/postgresql/data

  # 2. Redis (Para caché y bloqueos de reservas concurrentes)
  redis:
    image: redis:7-alpine
    container_name: cap-redis
    ports:
      - "6379:6379"

  # 3. Zookeeper (Requisito para que Kafka funcione)
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: cap-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # 4. Apache Kafka (El Bus de Eventos)
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: cap-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # 5. Kong API Gateway (Modo DB-less para agilidad)
  kong:
    image: kong:latest
    container_name: cap-api-gateway
    environment:
      KONG_DATABASE: "off"
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001, 0.0.0.0:8444 ssl
    ports:
      - "8000:8000" # Puerto público para el Frontend
      - "8001:8001" # Puerto de administración (Solo nosotros)

volumes:
  pgdata: