spring.application.name=schedule-service
server.port=8083

# ── MySQL Database Configuration ──
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/cap_schedule?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:cap_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:cap_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA & Hibernate ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect