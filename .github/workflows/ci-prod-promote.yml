name: PROD - Promote Images from QA

on:
  push:
    branches:
      - main

jobs:
  promote-to-prod:
    name: Promote QA Images to Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_KENNYCIS }}
          password: ${{ secrets.DOCKER_KENNYCISPASSWORD }}

      - name: Promote Auth Service
        run: |
          docker pull ${{ secrets.DOCKER_KENNYCIS }}/cap-auth-service:qa
          docker tag ${{ secrets.DOCKER_KENNYCIS }}/cap-auth-service:qa ${{ secrets.DOCKER_KENNYCIS }}/cap-auth-service:prod
          docker push ${{ secrets.DOCKER_KENNYCIS }}/cap-auth-service:prod

      - name: Promote Room Service
        run: |
          docker pull ${{ secrets.DOCKER_KENNYCIS }}/cap-room-service:qa
          docker tag ${{ secrets.DOCKER_KENNYCIS }}/cap-room-service:qa ${{ secrets.DOCKER_KENNYCIS }}/cap-room-service:prod
          docker push ${{ secrets.DOCKER_KENNYCIS }}/cap-room-service:prod

      - name: Promote Reservation Service
        run: |
          docker pull ${{ secrets.DOCKER_KENNYCIS }}/cap-reservation-service:qa
          docker tag ${{ secrets.DOCKER_KENNYCIS }}/cap-reservation-service:qa ${{ secrets.DOCKER_KENNYCIS }}/cap-reservation-service:prod
          docker push ${{ secrets.DOCKER_KENNYCIS }}/cap-reservation-service:prod

      - name: Promote Notification Service
        run: |
          docker pull ${{ secrets.DOCKER_KENNYCIS }}/cap-notification-service:qa
          docker tag ${{ secrets.DOCKER_KENNYCIS }}/cap-notification-service:qa ${{ secrets.DOCKER_KENNYCIS }}/cap-notification-service:prod
          docker push ${{ secrets.DOCKER_KENNYCIS }}/cap-notification-service:prod 

      - name: Promote Audit Service
        run: |
          docker pull ${{ secrets.DOCKER_KENNYCIS }}/cap-audit-service:qa
          docker tag ${{ secrets.DOCKER_KENNYCIS }}/cap-audit-service:qa ${{ secrets.DOCKER_KENNYCIS }}/cap-audit-service:prod
          docker push ${{ secrets.DOCKER_KENNYCIS }}/cap-audit-service:prod
      
      - name: Promote Backup Service
        run: |
          docker pull ${{ secrets.DOCKER_KENNYCIS }}/cap-backup-service:qa
          docker tag ${{ secrets.DOCKER_KENNYCIS }}/cap-backup-service:qa ${{ secrets.DOCKER_KENNYCIS }}/cap-backup-service:prod
          docker push ${{ secrets.DOCKER_KENNYCIS }}/cap-backup-service:prod
      
      - name: Promote Schedule Service
        run: |
          docker pull ${{ secrets.DOCKER_KENNYCIS }}/cap-schedule-service:qa
          docker tag ${{ secrets.DOCKER_KENNYCIS }}/cap-schedule-service:qa ${{ secrets.DOCKER_KENNYCIS }}/cap-schedule-service:prod
          docker push ${{ secrets.DOCKER_KENNYCIS }}/cap-schedule-service:prod
      
      - name: Promote Frontend App
        run: |
          docker pull ${{ secrets.DOCKER_KENNYCIS }}/cap-frontend:qa
          docker tag ${{ secrets.DOCKER_KENNYCIS }}/cap-frontend:qa ${{ secrets.DOCKER_KENNYCIS }}/cap-frontend:prod
          docker push ${{ secrets.DOCKER_KENNYCIS }}/cap-frontend:prod

      - name: Deploy to AWS EC2 (Production Environment)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST_PROD }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY_PROD }}
          script: |
            # Navigate to the PROD project directory
            cd cap-prod
            
            # Pull the newly promoted PROD images from Docker Hub
            sudo docker-compose pull
            
            # Stop currently running containers
            sudo docker-compose down
            
            # Start the updated containers and clean up any orphaned ones
            sudo docker-compose up -d --remove-orphans
            
            # Remove old unused images to save EC2 disk space
            sudo docker image prune -f
