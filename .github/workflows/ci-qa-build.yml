name: QA - Test, Build & Push Docker Images

on:
  push:
    branches:
      - qa

jobs:
  test-build-push-qa:
    name: Test, Build and Push QA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # ==========================================
      # 1. AUTOMATED TESTING PHASE (CI)
      # ==========================================
      
      # --- Node.js Tests ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Auth Service Tests
        working-directory: ./backend/auth-service
        run: |
          npm install
          npm test --passWithNoTests

      - name: Run Notification Service Tests
        working-directory: ./backend/notification-service
        run: |
          npm install
          npm test --passWithNoTests

      - name: Run Reservation Service Tests
        working-directory: ./backend/reservation-service
        run: |
          npm install
          npm test --passWithNoTests

      # --- Python Tests ---
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run Room Service Tests
        working-directory: ./backend/room-service
        run: |
          pip install -r requirements.txt
          pip install pytest httpx
          pytest

      # --- Golang Tests ---
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'

      - name: Run Audit Service Tests
        working-directory: ./backend/audit-service
        run: go test ./... -v

      - name: Run Backup Service Tests
        working-directory: ./backend/backup-service
        run: go test ./... -v

      # ==========================================
      # 2. BUILD & PUSH PHASE (CD)
      # ==========================================

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_KENNYCIS }}
          password: ${{ secrets.DOCKER_KENNYCISPASSWORD }}

      - name: Build and Push Auth Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/auth-service
          push: true
          tags: ${{ secrets.DOCKER_KENNYCIS }}/cap-auth-service:qa

      - name: Build and Push Room Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/room-service
          push: true
          tags: ${{ secrets.DOCKER_KENNYCIS }}/cap-room-service:qa

      - name: Build and Push Reservations Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/reservation-service  
          push: true
          tags: ${{ secrets.DOCKER_KENNYCIS }}/cap-reservation-service:qa

      - name: Build and Push Notification Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/notification-service 
          push: true
          tags: ${{ secrets.DOCKER_KENNYCIS }}/cap-notification-service:qa
      
      - name: Build and Push Audit Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/audit-service
          push: true
          tags: ${{ secrets.DOCKER_KENNYCIS }}/cap-audit-service:qa

      - name: Build and Push Backup Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/backup-service
          push: true
          tags: ${{ secrets.DOCKER_KENNYCIS }}/cap-backup-service:qa
      
      - name: Build and Push Frontend App
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/web-app
          push: true
          tags: ${{ secrets.DOCKER_KENNYCIS }}/cap-frontend:qa

      # ==========================================
      # 3. DEPLOYMENT PHASE (AWS EC2)
      # ==========================================

      - name: Deploy to AWS EC2 (QA Environment)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST_QA }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY_QA }}
          script: |
            # Navigate to the QA project directory
            cd cap-qa
            
            # Pull the newly built QA images from Docker Hub
            sudo docker-compose pull
            
            # Stop currently running containers
            sudo docker-compose down
            
            # Start the updated containers and clean up any orphaned ones
            sudo docker-compose up -d --remove-orphans
            
            # Remove old unused images to save EC2 disk space
            sudo docker image prune -f
