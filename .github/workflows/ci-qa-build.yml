name: QA - Build & Push Docker Images

on:
  push:
    branches:
      - qa

jobs:
  build-and-push-qa:
    name: Build and Push QA Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_KENNYCIS }}
          password: ${{ secrets.DOCKER_KENNYCISPASSWORD }}

      - name: Build and Push Auth Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/auth-service
          push: true
          tags: ${{ secrets.DOCKER_KENNYCIS }}/cap-auth-service:qa

      - name: Build and Push Room Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/room-service
          push: true
          tags: ${{ secrets.DOCKER_KENNYCIS }}/cap-room-service:qa

      - name: Build and Push Reservations Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/reservation-service  
          push: true
          tags: ${{ secrets.DOCKER_KENNYCIS }}/cap-reservation-service:qa

      - name: Build and Push Notifications Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/notification-service 
          push: true
          tags: ${{ secrets.DOCKER_KENNYCIS }}/cap-notification-service:qa