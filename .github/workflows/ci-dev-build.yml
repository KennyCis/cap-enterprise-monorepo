name: Desarrollo - Build & Push a Docker Hub

on:
  push:
    branches:
      - develop

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Descargar código del repositorio
        uses: actions/checkout@v3

      - name: 🔑 Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_KENNYCIS }}
          password: ${{ secrets.DOCKER_KENNYCISPASSWORD }}

      - name: 🔐 Construir y Subir Auth Service
        run: |
          docker build -t ${{ secrets.DOCKER_KENNYCIS }}/cap-auth-service:dev ./backend/auth-service || docker build -t ${{ secrets.DOCKER_KENNYCIS }}/cap-auth-service:dev ./auth-service
          docker push ${{ secrets.DOCKER_KENNYCIS }}/cap-auth-service:dev

      - name: 🏫 Construir y Subir Room Service
        run: |
          docker build -t ${{ secrets.DOCKER_KENNYCIS }}/cap-room-service:dev ./backend/room-service || docker build -t ${{ secrets.DOCKER_KENNYCIS }}/cap-room-service:dev ./room-service
          docker push ${{ secrets.DOCKER_KENNYCIS }}/cap-room-service:dev

      # --- LOS 2 NUEVOS MICROSERVICIOS CON LAS RUTAS CORREGIDAS ---
      
      - name: 📅 Construir y Subir Reservation Service
        run: |
          docker build -t ${{ secrets.DOCKER_KENNYCIS }}/cap-reservation-service:dev ./backend/reservations-service || docker build -t ${{ secrets.DOCKER_KENNYCIS }}/cap-reservation-service:dev ./reservations-service
          docker push ${{ secrets.DOCKER_KENNYCIS }}/cap-reservation-service:dev

      - name: 🔔 Construir y Subir Notification Service
        run: |
          docker build -t ${{ secrets.DOCKER_KENNYCIS }}/cap-notification-service:dev ./backend/notifications-service || docker build -t ${{ secrets.DOCKER_KENNYCIS }}/cap-notification-service:dev ./notifications-service
          docker push ${{ secrets.DOCKER_KENNYCIS }}/cap-notification-service:dev