name: CAP Enterprise CI/CD Pipeline

on:
  push:
    branches:
      - main
      - qa
      - develop
  pull_request:
    branches:
      - main
      - qa

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_KENNYCIS }}
          password: ${{ secrets.DOCKER_KENNYCISPASSWORD }}

      - name: Build and Push Auth Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/auth-service
          push: true
          tags: ${{ secrets.DOCKER_KENNYCIS }}/cap-auth-service:latest

      - name: Build and Push Room Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/room-service
          push: true
          tags: ${{ secrets.DOCKER_KENNYCIS }}/cap-room-service:latest